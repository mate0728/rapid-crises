<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Response Units | CrisisNexus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="main-content">

  <div class="page-header">
    <div class="page-header-left">
      <h1><i class="fa-solid fa-users-viewfinder" style="color:var(--accent-cyan);margin-right:10px"></i>Response Units</h1>
      <p class="subtitle">Manage and dispatch emergency personnel across all zones</p>
    </div>
    <div class="header-actions">
      <span class="live-badge"><span class="live-dot"></span> LIVE</span>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> Add Personnel</button>
    </div>
  </div>

  <!-- Availability Stats -->
  <div class="grid-4" style="margin-bottom:20px">
    <div class="stat-card green" style="padding:14px 18px">
      <div class="stat-label">Available</div>
      <div class="stat-value" id="p-stat-available" style="font-size:1.6rem">—</div>
    </div>
    <div class="stat-card red" style="padding:14px 18px">
      <div class="stat-label">Busy / On Scene</div>
      <div class="stat-value" id="p-stat-busy" style="font-size:1.6rem">—</div>
    </div>
    <div class="stat-card blue" style="padding:14px 18px">
      <div class="stat-label">En Route</div>
      <div class="stat-value" id="p-stat-enroute" style="font-size:1.6rem">—</div>
    </div>
    <div class="stat-card cyan" style="padding:14px 18px">
      <div class="stat-label">Total Units</div>
      <div class="stat-value" id="p-stat-total" style="font-size:1.6rem">—</div>
    </div>
  </div>

  <!-- Filters + Table -->
  <div class="card">
    <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center">
      <input id="p-search" type="text" placeholder="Search name, zone..." style="background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:8px;padding:8px 14px;color:var(--text-primary);font-family:var(--font-body);font-size:0.82rem;flex:1;min-width:160px;outline:none" oninput="renderTable()" />
      <select id="p-filter-role" style="background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:8px;padding:8px 12px;color:var(--text-primary);font-family:var(--font-body);font-size:0.82rem" onchange="renderTable()">
        <option value="">All Roles</option>
        <option>Security</option><option>Medical</option><option>Fire</option>
        <option>Manager</option><option>Police</option><option>Maintenance</option><option>Evacuation</option>
      </select>
      <select id="p-filter-status" style="background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:8px;padding:8px 12px;color:var(--text-primary);font-family:var(--font-body);font-size:0.82rem" onchange="renderTable()">
        <option value="">All Statuses</option>
        <option>Available</option><option>Busy</option><option>En Route</option><option>Off Duty</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Status</th>
            <th>Zone / Assignment</th>
            <th>Contact</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="personnel-tbody">
          <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="personnelModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="p-modal-title">Add Personnel</div>
      <button class="modal-close" onclick="closePersonnelModal()">✕</button>
    </div>
    <div class="form-group"><label>Full Name / Unit ID</label><input id="p-name" type="text" placeholder="e.g. Officer Sharma or Unit-4A" /></div>
    <div class="form-row">
      <div class="form-group">
        <label>Role</label>
        <select id="p-role">
          <option>Security</option><option>Medical</option><option>Fire</option>
          <option>Manager</option><option>Police</option><option>Maintenance</option><option>Evacuation</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="p-status">
          <option>Available</option><option>Busy</option><option>En Route</option><option>Off Duty</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Zone / Location</label><input id="p-zone" type="text" placeholder="e.g. Block A, Gate 2" /></div>
      <div class="form-group"><label>Contact Number</label><input id="p-contact" type="text" placeholder="+91-XXXXXXXXXX" /></div>
    </div>
    <div class="form-group"><label>Assigned Incident ID (optional)</label><input id="p-incident" type="text" placeholder="e.g. INC-XXXX" /></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="closePersonnelModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:2" id="p-submit-btn" onclick="submitPersonnel()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
    </div>
  </div>
</div>

<script src="sidebar.js"></script>
<script>
const API = '/api/personnel';
let allPersonnel = [], editingId = null;

const roleIcons = { Security:'fa-shield', Medical:'fa-kit-medical', Fire:'fa-fire-extinguisher', Manager:'fa-briefcase', Police:'fa-badge', Maintenance:'fa-wrench', Evacuation:'fa-person-running' };
const roleColors = { Security:'#2979ff', Medical:'#00e676', Fire:'#ff6d00', Manager:'#aa00ff', Police:'#00e5ff', Maintenance:'#ffd600', Evacuation:'#ff1744' };

function statusBadgeClass(s) {
  return { Available:'available', Busy:'busy', 'En Route':'en-route', 'Off Duty':'off-duty' }[s] || 'off-duty';
}

async function loadPersonnel() {
  try {
    const res = await fetch(API);
    const d = await res.json();
    if (d.success) { allPersonnel = d.personnel; updateStats(); renderTable(); }
  } catch (e) {}
}

function updateStats() {
  document.getElementById('p-stat-available').textContent = allPersonnel.filter(p => p.status === 'Available').length;
  document.getElementById('p-stat-busy').textContent = allPersonnel.filter(p => p.status === 'Busy').length;
  document.getElementById('p-stat-enroute').textContent = allPersonnel.filter(p => p.status === 'En Route').length;
  document.getElementById('p-stat-total').textContent = allPersonnel.length;
}

function renderTable() {
  const search = document.getElementById('p-search').value.toLowerCase();
  const role = document.getElementById('p-filter-role').value;
  const status = document.getElementById('p-filter-status').value;

  const filtered = allPersonnel.filter(p =>
    (!role || p.role === role) &&
    (!status || p.status === status) &&
    (!search || [p.name, p.zone, p.contact].join(' ').toLowerCase().includes(search))
  );

  const tbody = document.getElementById('personnel-tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>No personnel found</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(p => {
    const icon = roleIcons[p.role] || 'fa-user';
    const color = roleColors[p.role] || '#8892aa';
    return `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:34px;height:34px;border-radius:50%;background:rgba(${hexToRgb(color)},0.15);border:1px solid rgba(${hexToRgb(color)},0.3);display:flex;align-items:center;justify-content:center;color:${color};font-size:0.85rem;flex-shrink:0">
              <i class="fa-solid ${icon}"></i>
            </div>
            <div>
              <div style="font-weight:600;font-size:0.88rem">${p.name}</div>
              <div style="font-size:0.72rem;color:var(--text-muted);font-family:var(--font-mono)">${p._id.slice(-6).toUpperCase()}</div>
            </div>
          </div>
        </td>
        <td><span style="color:${color};font-size:0.83rem;font-weight:500"><i class="fa-solid ${icon}" style="margin-right:5px"></i>${p.role}</span></td>
        <td><span class="badge badge-${statusBadgeClass(p.status)}">${p.status}</span></td>
        <td>
          <div style="font-size:0.83rem">${p.zone || '—'}</div>
          ${p.assignedIncident ? `<div style="font-size:0.72rem;color:var(--accent-cyan);font-family:var(--font-mono)">${p.assignedIncident}</div>` : ''}
        </td>
        <td style="font-size:0.82rem;font-family:var(--font-mono);color:var(--text-secondary)">${p.contact || '—'}</td>
        <td>
          <div style="display:flex;gap:5px">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal('${p._id}')"><i class="fa-solid fa-pen"></i></button>
            <select style="background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:6px;padding:4px 8px;color:var(--text-primary);font-size:0.75rem;cursor:pointer" onchange="quickStatusUpdate('${p._id}', this.value)">
              <option value="">— Set Status</option>
              <option>Available</option><option>Busy</option><option>En Route</option><option>Off Duty</option>
            </select>
            <button class="btn btn-danger btn-sm" onclick="deletePersonnel('${p._id}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function openAddModal() {
  editingId = null;
  document.getElementById('p-modal-title').textContent = 'Add Personnel';
  ['p-name','p-zone','p-contact','p-incident'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('personnelModal').classList.add('active');
}

function openEditModal(id) {
  const p = allPersonnel.find(x => x._id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('p-modal-title').textContent = 'Edit Personnel';
  document.getElementById('p-name').value = p.name || '';
  document.getElementById('p-role').value = p.role || 'Security';
  document.getElementById('p-status').value = p.status || 'Available';
  document.getElementById('p-zone').value = p.zone || '';
  document.getElementById('p-contact').value = p.contact || '';
  document.getElementById('p-incident').value = p.assignedIncident || '';
  document.getElementById('personnelModal').classList.add('active');
}

function closePersonnelModal() {
  document.getElementById('personnelModal').classList.remove('active');
  editingId = null;
}

async function submitPersonnel() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) { showToast('Required', 'Name is required', 'warning'); return; }

  const payload = {
    name,
    role: document.getElementById('p-role').value,
    status: document.getElementById('p-status').value,
    zone: document.getElementById('p-zone').value,
    contact: document.getElementById('p-contact').value,
    assignedIncident: document.getElementById('p-incident').value || null
  };

  try {
    const url = editingId ? `${API}/${editingId}` : API;
    const method = editingId ? 'PATCH' : 'POST';
    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const d = await res.json();
    if (d.success) {
      showToast(editingId ? 'Updated' : 'Added', `${name} saved`, 'success');
      closePersonnelModal();
      loadPersonnel();
    } else { showToast('Error', d.error, 'error'); }
  } catch (e) { showToast('Error', 'Failed to save', 'error'); }
}

async function quickStatusUpdate(id, status) {
  if (!status) return;
  try {
    await fetch(`${API}/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
    showToast('Updated', `Status set to ${status}`, 'success');
    loadPersonnel();
  } catch (e) {}
}

async function deletePersonnel(id) {
  if (!confirm('Remove this personnel?')) return;
  try {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    showToast('Removed', 'Personnel deleted', 'info');
    loadPersonnel();
  } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  loadPersonnel();
  setInterval(loadPersonnel, 15000);
  setTimeout(() => {
    if (window._crisisSocket) window._crisisSocket.on('personnel:updated', loadPersonnel);
  }, 1500);
});
</script>
</body>
</html>
