<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Topography | CrisisNexus</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: calc(100vh - 200px); min-height: 450px; border-radius: 12px; }
    .leaflet-popup-content-wrapper { background: rgba(14,16,28,0.97); border: 1px solid rgba(0,229,255,0.3); border-radius: 10px; color: #e8ecf4; }
    .leaflet-popup-tip { background: rgba(14,16,28,0.97); }
    .leaflet-popup-content { margin: 12px 16px; }
    .popup-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .popup-row { font-size: 0.8rem; color: #8892aa; margin: 3px 0; }
    .popup-row span { color: #e8ecf4; font-weight: 500; }
  </style>
</head>
<body>
<div class="main-content">

  <div class="page-header">
    <div class="page-header-left">
      <h1><i class="fa-solid fa-map-location-dot" style="color:var(--accent-cyan);margin-right:10px"></i>Live Topography</h1>
      <p class="subtitle">Geospatial visualization of all active and recent incidents</p>
    </div>
    <div class="header-actions">
      <span class="live-badge"><span class="live-dot"></span> LIVE MAP</span>
      <select id="map-filter" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="refreshMap()">
        <option value="">All Statuses</option>
        <option value="ACTIVE">Active Only</option>
        <option value="RESPONDING">Responding</option>
        <option value="RESOLVED">Resolved</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="resetView()"><i class="fa-solid fa-compress"></i> Reset View</button>
    </div>
  </div>

  <!-- Map Stats Bar -->
  <div class="grid-4" style="margin-bottom:16px">
    <div class="stat-card red" style="padding:14px 18px">
      <div class="stat-label">Active</div>
      <div class="stat-value" id="map-stat-active" style="font-size:1.6rem">—</div>
    </div>
    <div class="stat-card blue" style="padding:14px 18px">
      <div class="stat-label">Responding</div>
      <div class="stat-value" id="map-stat-responding" style="font-size:1.6rem">—</div>
    </div>
    <div class="stat-card orange" style="padding:14px 18px">
      <div class="stat-label">Markers</div>
      <div class="stat-value" id="map-stat-markers" style="font-size:1.6rem">0</div>
    </div>
    <div class="stat-card green" style="padding:14px 18px">
      <div class="stat-label">Last Update</div>
      <div class="stat-value" id="map-stat-time" style="font-size:1rem;font-family:var(--font-mono)">—</div>
    </div>
  </div>

  <div class="card" style="padding:10px">
    <div id="map"></div>
  </div>

  <!-- Legend -->
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:0.78rem;color:var(--text-secondary)">
    <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#ff1744;margin-right:4px;vertical-align:middle"></span>Critical</span>
    <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#ff6d00;margin-right:4px;vertical-align:middle"></span>High</span>
    <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#ffd600;margin-right:4px;vertical-align:middle"></span>Medium</span>
    <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#00e676;margin-right:4px;vertical-align:middle"></span>Low / Resolved</span>
    <span style="margin-left:auto;color:var(--text-muted)">Click markers for incident details</span>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="sidebar.js"></script>
<script>
const API = '/api/alerts';
let map, markers = [], defaultCenter = [20.5937, 78.9629]; // India center

// Severity → color
const sevColor = { Critical: '#ff1744', High: '#ff6d00', Medium: '#ffd600', Low: '#00e676', undefined: '#2979ff' };
const statusColor = { RESOLVED: '#00e676', CONTAINED: '#ffd600', RESPONDING: '#2979ff', ACTIVE: '#ff1744' };

function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView(defaultCenter, 5);

  // Dark tile layer
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
  }).addTo(map);

  L.control.attribution({ prefix: '© OpenStreetMap | © CARTO' }).addTo(map);

  // Add user location
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      const userIcon = L.divIcon({
        html: `<div style="width:16px;height:16px;border-radius:50%;background:#00e5ff;border:3px solid white;box-shadow:0 0 15px rgba(0,229,255,0.8)"></div>`,
        className: '', iconSize: [16, 16], iconAnchor: [8, 8]
      });
      L.marker([lat, lng], { icon: userIcon }).addTo(map).bindPopup('<div class="popup-title">📍 Your Location</div>');
    });
  }

  refreshMap();
}

async function refreshMap() {
  try {
    const filter = document.getElementById('map-filter').value;
    const url = API + (filter ? `?status=${filter}` : '') + '&limit=200';
    const res = await fetch(url);
    const d = await res.json();
    if (!d.success) return;

    // Clear old markers
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const alerts = d.alerts;
    let withGPS = 0, withoutGPS = 0;
    const bounds = [];

    // Stats
    document.getElementById('map-stat-active').textContent = alerts.filter(a => a.status === 'ACTIVE').length;
    document.getElementById('map-stat-responding').textContent = alerts.filter(a => a.status === 'RESPONDING').length;
    document.getElementById('map-stat-time').textContent = new Date().toLocaleTimeString('en-IN', { hour12: false });

    alerts.forEach(a => {
      // Use real GPS if available, else cluster near hotel locations for demo
      let lat = a.lat, lng = a.lng;
      let hasRealGPS = lat && lng;
      if (!hasRealGPS) {
        // Generate pseudo-stable coordinates based on incidentId for demo
        const seed = (a.incidentId || a._id || '').charCodeAt(4) || 0;
        lat = 20 + (seed % 20) + (Math.sin(seed) * 2);
        lng = 72 + (seed % 25) + (Math.cos(seed) * 3);
        withoutGPS++;
      } else { withGPS++; }

      const color = sevColor[a.severity] || '#2979ff';
      const statusC = statusColor[a.status] || '#ff1744';
      const isPulsing = a.status === 'ACTIVE' && a.severity === 'Critical';

      const icon = L.divIcon({
        html: `
          <div style="position:relative">
            ${isPulsing ? `<div style="position:absolute;inset:-8px;border-radius:50%;border:2px solid ${color};animation:ring-expand 2s infinite;opacity:0.5"></div>` : ''}
            <div style="width:20px;height:20px;border-radius:50%;background:${color};border:3px solid rgba(0,0,0,0.5);box-shadow:0 0 12px ${color}88;cursor:pointer"></div>
          </div>`,
        className: '', iconSize: [20, 20], iconAnchor: [10, 10]
      });

      const marker = L.marker([lat, lng], { icon }).addTo(map);
      marker.bindPopup(`
        <div class="popup-title">${a.type} Emergency</div>
        <div class="popup-row">Location: <span>${a.location}</span></div>
        <div class="popup-row">Severity: <span style="color:${color}">${a.severity}</span></div>
        <div class="popup-row">Status: <span style="color:${statusC}">${a.status}</span></div>
        <div class="popup-row">Time: <span>${new Date(a.createdAt).toLocaleString('en-IN')}</span></div>
        ${a.message ? `<div class="popup-row" style="margin-top:6px;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px">${a.message.substring(0,80)}${a.message.length > 80 ? '...' : ''}</div>` : ''}
        ${!hasRealGPS ? `<div style="font-size:0.7rem;color:#4a5270;margin-top:4px">⚠ Approximate location (no GPS)</div>` : ''}
      `, { maxWidth: 260 });

      markers.push(marker);
      bounds.push([lat, lng]);
    });

    document.getElementById('map-stat-markers').textContent = markers.length;

    if (bounds.length > 0) {
      try { map.fitBounds(L.latLngBounds(bounds), { padding: [40, 40], maxZoom: 12 }); } catch (e) {}
    }
  } catch (e) {
    console.error('Map refresh error:', e);
  }
}

function resetView() {
  map.setView(defaultCenter, 5);
}

document.addEventListener('DOMContentLoaded', () => {
  initMap();
  setInterval(refreshMap, 15000);

  setTimeout(() => {
    if (window._crisisSocket) {
      window._crisisSocket.on('alert:new', refreshMap);
      window._crisisSocket.on('alert:updated', refreshMap);
    }
  }, 1500);
});
</script>
</body>
</html>
