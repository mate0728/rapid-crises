<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crisis Comms | CrisisNexus</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .comms-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }
    .chat-area { height: 460px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
    .msg-bubble { padding: 10px 14px; border-radius: 10px; max-width: 80%; font-size: 0.85rem; line-height: 1.5; }
    .msg-left { background: rgba(0,0,0,0.25); border: 1px solid var(--border-subtle); align-self: flex-start; }
    .msg-right { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); align-self: flex-end; }
    .msg-system { background: rgba(170,0,255,0.1); border: 1px solid rgba(170,0,255,0.2); align-self: center; text-align: center; font-size: 0.78rem; color: var(--text-muted); max-width: 100%; }
    .msg-meta { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
    .msg-alert { background: rgba(255,23,68,0.08); border: 1px solid rgba(255,23,68,0.2); align-self: flex-start; border-left: 3px solid var(--accent-red); }
    .channel-btn { padding: 8px 14px; border-radius: 8px; font-size: 0.82rem; border: 1px solid var(--border-subtle); cursor: pointer; background: transparent; color: var(--text-secondary); transition: all 0.2s; text-align: left; display: flex; align-items: center; gap: 8px; }
    .channel-btn.active { background: rgba(0,229,255,0.1); border-color: var(--accent-cyan); color: var(--accent-cyan); }
    .channel-btn:hover { border-color: var(--border-card); color: var(--text-primary); }
  </style>
</head>
<body>
<div class="main-content">

  <div class="page-header">
    <div class="page-header-left">
      <h1><i class="fa-solid fa-walkie-talkie" style="color:var(--accent-cyan);margin-right:10px"></i>Crisis Communications</h1>
      <p class="subtitle">Real-time command channel — coordinate response units live</p>
    </div>
    <div class="header-actions">
      <span class="live-badge"><span class="live-dot"></span> CHANNEL ACTIVE</span>
      <span id="online-count" style="font-size:0.8rem;color:var(--text-muted)"><i class="fa-solid fa-users" style="margin-right:4px"></i>— online</span>
    </div>
  </div>

  <div class="comms-grid">

    <!-- Chat Panel -->
    <div class="card" style="display:flex;flex-direction:column;height:580px">
      <!-- Channel Tabs -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="channel-btn active" id="ch-all" onclick="setChannel('all','All Channels')"><i class="fa-solid fa-hashtag"></i> All Channels</button>
        <button class="channel-btn" id="ch-fire" onclick="setChannel('fire','Fire Response')"><i class="fa-solid fa-fire" style="color:var(--accent-orange)"></i> Fire</button>
        <button class="channel-btn" id="ch-medical" onclick="setChannel('medical','Medical')"><i class="fa-solid fa-kit-medical" style="color:var(--accent-green)"></i> Medical</button>
        <button class="channel-btn" id="ch-security" onclick="setChannel('security','Security')"><i class="fa-solid fa-shield" style="color:var(--accent-blue)"></i> Security</button>
        <button class="channel-btn" id="ch-command" onclick="setChannel('command','Command')"><i class="fa-solid fa-star" style="color:var(--accent-yellow)"></i> Command</button>
      </div>

      <!-- Messages -->
      <div class="chat-area" id="chat-area"></div>

      <!-- Input -->
      <div style="margin-top:12px;display:flex;gap:8px;border-top:1px solid var(--border-subtle);padding-top:12px">
        <select id="sender-role" style="background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:8px;padding:8px 10px;color:var(--text-primary);font-family:var(--font-body);font-size:0.78rem;flex-shrink:0">
          <option>Command</option><option>Security</option><option>Medical</option><option>Fire</option><option>Manager</option>
        </select>
        <input id="chat-input" type="text" placeholder="Type message and press Enter..." style="flex:1;background:rgba(0,0,0,0.3);border:1px solid var(--border-subtle);border-radius:8px;padding:10px 14px;color:var(--text-primary);font-family:var(--font-body);font-size:0.875rem;outline:none" onkeydown="if(event.key==='Enter')sendMessage()" />
        <button class="btn btn-primary btn-sm" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div style="display:flex;flex-direction:column;gap:16px">

      <!-- Active Incidents (for quick context) -->
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-fire-flame-curved"></i> Active Incidents</div>
        <div id="active-incidents-list" style="display:flex;flex-direction:column;gap:8px;margin-top:4px;max-height:200px;overflow-y:auto">
          <div class="skeleton" style="height:44px"></div>
          <div class="skeleton" style="height:44px"></div>
        </div>
      </div>

      <!-- Available Personnel -->
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-users"></i> Available Units</div>
        <div id="available-units" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;max-height:220px;overflow-y:auto">
          <div class="skeleton" style="height:36px"></div>
          <div class="skeleton" style="height:36px"></div>
          <div class="skeleton" style="height:36px"></div>
        </div>
      </div>

      <!-- Quick Dispatch -->
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-bolt"></i> Quick Broadcast</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
          <button class="btn btn-danger btn-sm" onclick="quickBroadcast('🚨 ALL UNITS: EVACUATE IMMEDIATELY — report to assembly point')">🚨 Evacuation Order</button>
          <button class="btn btn-sm" style="background:rgba(255,109,0,0.15);color:var(--accent-orange);border:1px solid rgba(255,109,0,0.3)" onclick="quickBroadcast('🔥 FIRE RESPONSE TEAM: Proceed immediately to incident zone')">🔥 Fire Team Dispatch</button>
          <button class="btn btn-sm" style="background:rgba(0,230,118,0.12);color:var(--accent-green);border:1px solid rgba(0,230,118,0.25)" onclick="quickBroadcast('🏥 MEDICAL TEAM: Patient care required — report to triage zone')">🏥 Medical Dispatch</button>
          <button class="btn btn-sm" style="background:rgba(41,121,255,0.12);color:var(--accent-blue);border:1px solid rgba(41,121,255,0.3)" onclick="quickBroadcast('🛡️ SECURITY: Lockdown protocol initiated — secure all exits')">🛡️ Lockdown Protocol</button>
          <button class="btn btn-ghost btn-sm" onclick="quickBroadcast('✅ STAND DOWN: Incident resolved — all units return to base')">✅ All Clear / Stand Down</button>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="sidebar.js"></script>
<script>
let currentChannel = 'all';
let currentChannelLabel = 'All Channels';
let messages = [];
let userName = 'Operator';

const channelColors = { all: '#00e5ff', fire: '#ff6d00', medical: '#00e676', security: '#2979ff', command: '#ffd600' };

function setChannel(ch, label) {
  currentChannel = ch;
  currentChannelLabel = label;
  document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ch-' + ch).classList.add('active');
  renderMessages();
}

function addMessage(msg) {
  messages.push(msg);
  if (messages.length > 200) messages = messages.slice(-200);
  renderMessages();
}

function renderMessages() {
  const filtered = messages.filter(m => currentChannel === 'all' || m.channel === currentChannel || m.type === 'system');
  const area = document.getElementById('chat-area');
  area.innerHTML = filtered.length === 0
    ? `<div style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:24px">No messages in this channel yet</div>`
    : filtered.map(m => {
      if (m.type === 'system') return `<div class="msg-bubble msg-system">${m.text}</div>`;
      if (m.type === 'alert') return `
        <div class="msg-bubble msg-alert">
          <div class="msg-meta">🚨 SYSTEM ALERT — ${new Date(m.time).toLocaleTimeString()}</div>
          <div>${m.text}</div>
        </div>`;
      const isMe = m.sender === userName;
      return `
        <div class="msg-bubble ${isMe ? 'msg-right' : 'msg-left'}">
          <div class="msg-meta" style="color:${channelColors[m.channel] || '#8892aa'}">${m.sender} (${m.channel}) · ${new Date(m.time).toLocaleTimeString()}</div>
          <div>${m.text}</div>
        </div>`;
    }).join('');
  area.scrollTop = area.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const role = document.getElementById('sender-role').value;
  userName = role;
  const msg = { type: 'chat', sender: role, channel: currentChannel === 'all' ? 'command' : currentChannel, text, time: Date.now() };
  addMessage(msg);
  if (window._crisisSocket) window._crisisSocket.emit('comms:message', msg);
  input.value = '';
}

function quickBroadcast(text) {
  const msg = { type: 'chat', sender: 'Command', channel: 'command', text, time: Date.now() };
  addMessage(msg);
  if (window._crisisSocket) window._crisisSocket.emit('comms:message', msg);
  setChannel('command', 'Command');
}

async function loadActiveIncidents() {
  try {
    const res = await fetch('/api/alerts?status=ACTIVE&limit=5');
    const d = await res.json();
    const el = document.getElementById('active-incidents-list');
    if (!d.success || d.alerts.length === 0) {
      el.innerHTML = '<div style="color:var(--accent-green);font-size:0.82rem;text-align:center;padding:8px">✅ No active incidents</div>';
      return;
    }
    el.innerHTML = d.alerts.map(a => `
      <div style="padding:8px 10px;background:rgba(255,23,68,0.07);border-radius:8px;border:1px solid rgba(255,23,68,0.15);cursor:pointer" onclick="quickBroadcast('📍 Ref: ${a.incidentId} — ${a.type} at ${a.location} (${a.severity})')">
        <div style="font-size:0.82rem;font-weight:600">${a.type} <span style="font-family:var(--font-mono);font-size:0.72rem;color:var(--accent-cyan)">${a.incidentId}</span></div>
        <div style="font-size:0.75rem;color:var(--text-muted)">${a.location}</div>
      </div>`).join('');
  } catch (e) {}
}

async function loadAvailableUnits() {
  try {
    const res = await fetch('/api/personnel?status=Available');
    const d = await res.json();
    const el = document.getElementById('available-units');
    if (!d.success || d.personnel.length === 0) {
      el.innerHTML = '<div style="color:var(--text-muted);font-size:0.82rem;text-align:center;padding:8px">No units available</div>';
      return;
    }
    el.innerHTML = d.personnel.map(p => `
      <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(0,0,0,0.15);border-radius:7px;border:1px solid var(--border-subtle);cursor:pointer" onclick="quickBroadcast('📻 ${p.name} (${p.role}) — please respond on this channel')">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--accent-green);box-shadow:0 0 6px var(--accent-green);flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
          <div style="font-size:0.7rem;color:var(--text-muted)">${p.role}</div>
        </div>
      </div>`).join('');
  } catch (e) {}
}

// Welcome message
document.addEventListener('DOMContentLoaded', () => {
  addMessage({ type: 'system', text: `CrisisNexus Command Channel initialized — ${new Date().toLocaleString()}` });
  loadActiveIncidents();
  loadAvailableUnits();
  setInterval(loadActiveIncidents, 15000);
  setInterval(loadAvailableUnits, 15000);

  setTimeout(() => {
    const s = window._crisisSocket;
    if (s) {
      s.on('system:clients', n => {
        document.getElementById('online-count').innerHTML = `<i class="fa-solid fa-users" style="margin-right:4px"></i>${n} online`;
      });

      // Receive messages from other clients
      s.on('comms:message', msg => {
        if (msg.sender !== document.getElementById('sender-role').value || msg.time !== messages[messages.length-1]?.time) {
          addMessage(msg);
        }
      });

      // Alert notifications → auto post to channel
      s.on('alert:new', alert => {
        addMessage({ type: 'alert', text: `🚨 NEW ${alert.severity.toUpperCase()} ALERT: ${alert.type} at ${alert.location} — ${alert.message}`, time: Date.now(), channel: 'all' });
        loadActiveIncidents();
      });
      s.on('alert:resolved', () => loadActiveIncidents());
    }
  }, 1500);
});
</script>
</body>
</html>
